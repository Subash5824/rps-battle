<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME</title>
     <link rel="shortcut icon" href="./img/title.png" type="png/x-icon">
    <link rel="stylesheet" href="style.css">
   <script defer src="js/main.js"></script>
    
</head>
<body>
    <div class="box">
       <div class="player">
        <section id="user" class="image">
         <img src="./img/title.png" alt="player" width="300px" height="350px" loading="lazy" >
       </section>
      <section id="txt">
        <h3>Player</h3>
      </section>
     </div>
     <div class="start">
      <section id="strt">
        <img src="./img/play.png" alt="Start" width="150px" height="150px" loading="lazy">
      </section>
      </div>
      <div class="pop ">
      <div class="popup" id="popup">
        <div class="popupplay">
        <h4>Choose Rock,Paper,Scissor</h4>
        </div>
        <button type="submit" id="ok">okay</button>
      </div>
     </div>
     <div class="pc">
       <section id="computer"></section> 
        <section id="lap">
            <img src="./img/pc.jpg" alt="PC" width="300px" height="300px" loading="lazy"  >
        </section>
        <section id="txtpc">
          <h1>PC</h1>
        </section>
        </div>
           </div>
       <div class="item">
        <section id="perform">
          <div class="rock">
            <section id="rck">
           <img src="./img/rk.jpg" alt="rock" width="100px" height="100px" loading="lazy">
           </section>
          </div>
          <div class="paper">
            <section id="pap">
          <img src="./img/Paper.jpg" alt="paper" width="100px" height="100px" loading="lazy">
          </section>
          </div>  
          <div class="scissor">
            <section id="scior">
          <img src="./img/scissor.jpg" alt="scissor" width="100px" height="100px" loading="lazy">
          </section>
          </div>
        </section>
       </div>
      
</body>
</html>
